when:
  - event: tag
    ref: refs/tags/v*

steps:
  - name: package
    image: alpine:3
    commands:
      - apk add --no-cache zip
      - zip -j proton-pass-alfred.alfredworkflow action.py pass_core.py search.py info.plist icon.png
      - VERSION="${CI_COMMIT_TAG#v}"
      - awk -v v="$VERSION" '/^## \[/{ if (p) exit; if ($0 ~ "^## \\[" v "\\]") { p=1; next } } p' CHANGELOG.md > release-notes.md
      - test -s release-notes.md || { echo "no CHANGELOG section for $VERSION"; exit 1; }

  - name: release
    image: woodpeckerci/plugin-release
    settings:
      api-key:
        from_secret: GITHUB_TOKEN
      files:
        - proton-pass-alfred.alfredworkflow
      title: ${CI_COMMIT_TAG}
      note: release-notes.md
